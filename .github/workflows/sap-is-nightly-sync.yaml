name: sap-is-nightly-sync

on:
  schedule:
    - cron: "0 2 * * *"      # 02:00 UTC nightly
  workflow_dispatch: {}       # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run SAP IS -> GitHub sync
        id: sync
        env:
          SAP_IS_PRD_CLIENT_ID: ${{ secrets.SAP_IS_PRD_CLIENT_ID }}
          SAP_IS_PRD_CLIENT_SECRET: ${{ secrets.SAP_IS_PRD_CLIENT_SECRET }}
          DRIFT_NOTIFY_WEBHOOK_URL: ${{ secrets.DRIFT_NOTIFY_WEBHOOK_URL }}
        run: |
          set +e
          python scripts/sap_is_github_sync.py --env PRD --config config/environments.yaml 2>&1 | tee sync.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code
        shell: bash
        continue-on-error: true

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: sync.log
          retention-days: 14

      - name: Open issue on drift or failure
        if: steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.sync.outputs.exit_code }}';
            const reportPath = 'drift_report/latest.json';
            let body;

            if (fs.existsSync(reportPath) && fs.statSync(reportPath).size > 0) {
              // Script ran to completion and exited non-zero because drift was found (exit code 2)
              try {
                const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                body = [
                  `Exit code: ${exitCode}`,
                  `Forward drift: ${report.forward_drift.length}`,
                  `Reverse drift: ${report.reverse_drift.length}`,
                  `Certificate warnings: ${report.cert_drift.length}`,
                  '',
                  '```json',
                  JSON.stringify(report, null, 2),
                  '```',
                ].join('\n');
              } catch (e) {
                body = `Exit code: ${exitCode}\n\ndrift_report/latest.json exists but could not be parsed: ${e.message}`;
              }
            } else {
              // Script failed before it could write a drift report - a real error (auth, network, config, etc.)
              const log = fs.existsSync('sync.log') ? fs.readFileSync('sync.log', 'utf8') : '(no log captured)';
              const tail = log.split('\n').slice(-60).join('\n');
              body = [
                `The sync script exited with code ${exitCode} before producing a drift report - this indicates a script error, not detected drift.`,
                '',
                '```',
                tail,
                '```',
                '',
                'Full log: see the `sync-log` artifact on this workflow run.',
              ].join('\n');
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SAP IS <-> GitHub sync issue - ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['sap-is-sync', 'drift'],
            });
